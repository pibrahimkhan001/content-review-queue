server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy rules ---
    # All API traffic goes to the backend service.
    # Keepalive is important so the React dev experience matches Docker.

    location /auth/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /metrics {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /health {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Tickets — includes the /stream SSE endpoint which needs special treatment
    location /tickets/ {
        proxy_pass              http://backend:4000;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        Connection '';

        # Required for SSE: disable all buffering so events flow immediately
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;  # hold SSE connections open for up to 1 hour
        chunked_transfer_encoding on;
    }
}
