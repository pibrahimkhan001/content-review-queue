# docker-compose.override.yml
#
# This file is automatically merged by docker-compose when present.
# It overrides settings for local development:
#   - Mounts source code so you don't need to rebuild on every change
#   - Runs nodemon for backend hot-reload
#   - Exposes Postgres and Redis ports for direct access from the host
#
# For a clean production-like build, run:
#   docker-compose -f docker-compose.yml up --build

version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: base
    command: ["npx", "nodemon", "src/server.js"]
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
